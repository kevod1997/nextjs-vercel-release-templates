# Optional: nightly Postgres -> Cloudflare R2 backup.
# Delete this file if you do not need encrypted off-site backups.
# Required secrets (in repo settings): DATABASE_URL_BACKUP, R2_ACCOUNT_ID,
# R2_BUCKET, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY.
name: Database Backup

on:
  schedule:
    # 06:00 UTC. Adjust for your timezone.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: database-backup-production
  cancel-in-progress: false

jobs:
  backup:
    name: Dump PostgreSQL to Cloudflare R2
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_DEFAULT_REGION: auto
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      PGCONNECT_TIMEOUT: "15"
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      DATABASE_URL_BACKUP: ${{ secrets.DATABASE_URL_BACKUP }}

    steps:
      - name: Validate secret configuration
        shell: bash
        run: |
          set -Eeuo pipefail

          missing=0
          for key in \
            DATABASE_URL_BACKUP \
            R2_ACCOUNT_ID \
            R2_BUCKET \
            AWS_ACCESS_KEY_ID \
            AWS_SECRET_ACCESS_KEY
          do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret or environment value: ${key}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          echo "::add-mask::${DATABASE_URL_BACKUP}"
          echo "::add-mask::${AWS_ACCESS_KEY_ID}"
          echo "::add-mask::${AWS_SECRET_ACCESS_KEY}"

          # Railway gotcha: the internal hostname is unreachable from GitHub Actions.
          # Use DATABASE_PUBLIC_URL / TCP Proxy URL instead. Drop this guard if not on Railway.
          if [[ "${DATABASE_URL_BACKUP}" == *".railway.internal"* ]]; then
            echo "::error::DATABASE_URL_BACKUP must use a publicly reachable host, not the private *.railway.internal host."
            exit 1
          fi

      - name: Install backup tools
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends postgresql-client awscli

      - name: Create and upload dump
        shell: bash
        run: |
          set -Eeuo pipefail

          timestamp="$(date -u +'%Y-%m-%d_%H-%M')"
          day_path="$(date -u +'%Y/%m/%d')"
          backup_file="${RUNNER_TEMP}/{{PROJECT_SLUG}}_${timestamp}.dump"
          backup_key="prod/daily/${day_path}/{{PROJECT_SLUG}}_${timestamp}.dump"
          r2_endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          cleanup() {
            rm -f "${backup_file}"
          }
          trap cleanup EXIT

          pg_dump \
            --format=custom \
            --no-owner \
            --no-privileges \
            --dbname="${DATABASE_URL_BACKUP}" \
            --file="${backup_file}"

          if [ ! -s "${backup_file}" ]; then
            echo "::error::pg_dump produced an empty backup file."
            exit 1
          fi

          pg_restore --list "${backup_file}" > "${RUNNER_TEMP}/backup_manifest.txt"

          aws s3 cp \
            "${backup_file}" \
            "s3://${R2_BUCKET}/${backup_key}" \
            --endpoint-url "${r2_endpoint}" \
            --only-show-errors

          aws s3api head-object \
            --bucket "${R2_BUCKET}" \
            --key "${backup_key}" \
            --endpoint-url "${r2_endpoint}" \
            > /dev/null

          backup_size="$(stat -c%s "${backup_file}")"
          echo "Backup uploaded to r2://${R2_BUCKET}/${backup_key}"
          echo "Backup size: ${backup_size} bytes"
