name: PR CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-pr:
    name: Validate PR Metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false

      - name: Validate PR title
        run: node scripts/ship.mjs validate-pr-title

      - name: Validate PR body
        run: node scripts/ship.mjs validate-pr-body

  ci:
    name: Secretless PR CI
    runs-on: ubuntu-latest
    needs: validate-pr
    env:
      CI: "true"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: drizzle_db
          POSTGRES_PASSWORD: admin
          POSTGRES_USER: admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d drizzle_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903
        with:
          cache: npm
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Prepare tracked CI env files
        run: |
          cp .env.ci.example .env.local
          cp .env.ci.example .env.test.local

      - name: Point tests at CI Postgres
        run: node scripts/ship.mjs patch-test-env --file .env.test.local --database-url postgresql://admin:admin@127.0.0.1:5432/{{DB_NAME_TEST}}

      - name: Validate tracked CI env contract
        run: npm run env:check:production

      - name: Prepare test database
        run: npm run db:prepare:test

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build with tracked CI env
        run: npm run build
